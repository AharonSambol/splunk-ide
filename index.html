<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Splunk IDE</title>
    <style>
        /* Dark theme IDE styling */
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #cccccc;
        }

        #app-shell {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #sidebar {
            width: 260px;
            background: #252526;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        #sidebar.collapsed {
            display: none;
        }

        #sidebar-reopen {
            display: none;
            flex-shrink: 0;
            width: 28px;
            background: #252526;
            border: none;
            border-right: 1px solid #333;
            color: #9cdcfe;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0;
        }

        #sidebar-reopen.visible {
            display: block;
        }

        #sidebar-reopen:hover {
            background: #2d2d30;
            color: #fff;
        }

        #sidebar-header {
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: space-between;
            font-weight: 600;
            font-size: 0.8rem;
            color: #c8c8c8;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        #sidebar-header-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #sidebar-header-actions {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }

        #sidebar-header #new-file-btn,
        #sidebar-collapse-btn {
            background: transparent;
            border: none;
            color: #8a8a8a;
            cursor: pointer;
            font-size: 0.95rem;
            line-height: 1;
            padding: 2px 5px;
            border-radius: 3px;
            margin: 0;
            font-weight: normal;
            fill: unset;
        }

        #sidebar-header #new-file-btn:hover,
        #sidebar-collapse-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        #sidebar-header #new-file-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            background: transparent;
        }

        #explorer {
            flex: 1;
            overflow: auto;
            padding: 10px 12px;
        }

        #query-history-tabs {
            display: flex;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        .history-tab {
            flex: 1;
            padding: 6px 4px;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: #8a8a8a;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .history-tab:hover {
            color: #ccc;
            background: rgba(255, 255, 255, 0.04);
        }

        .history-tab.active {
            color: #9cdcfe;
            border-bottom-color: #007acc;
        }

        .version-tag-pill {
            display: inline-block;
            margin-left: 6px;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.65rem;
            font-weight: 500;
            color: #9cdcfe;
            background: rgba(156, 220, 254, 0.15);
            vertical-align: middle;
        }

        #tag-popup {
            position: fixed;
            z-index: 30;
            display: none;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
            background: #1f2124;
            border: 1px solid #444;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
            min-width: 280px;
            width: 280px;
            box-sizing: border-box;
        }

        #tag-popup.visible {
            display: flex;
        }

        #tag-popup-input {
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 8px 10px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #101214;
            color: #fff;
            font-size: 0.85rem;
            outline: none;
        }

        #tag-popup-actions {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
        }

        #tag-popup-actions button {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        #tag-popup-cancel {
            background: #3d3d3d;
            color: #ccc;
        }

        #tag-popup-save {
            background: #0e639c;
            color: #fff;
        }

        #query-sidebar {
            width: 320px;
            background: #252526;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }

        #query-sidebar.collapsed {
            display: none;
        }

        #query-sidebar-resize {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            cursor: col-resize;
            z-index: 2;
        }

        #query-sidebar-resize:hover,
        #query-sidebar-resize.dragging {
            background: #007acc;
        }

        #query-history-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid #333;
            background: #2d2d30;
            flex-shrink: 0;
        }

        #query-history-title {
            font-weight: 600;
            font-size: 0.9rem;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #query-history-status {
            font-size: 0.75rem;
            color: #8a8a8a;
            flex-shrink: 0;
        }

        #query-history-status.dirty {
            color: #ffa500;
        }

        #query-history-close {
            background: transparent;
            border: none;
            color: #8a8a8a;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 2px 6px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        #query-history-close:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        #query-version-list {
            flex: 1;
            overflow-y: auto;
            min-height: 100px;
            border-bottom: 1px solid #333;
        }

        .query-version-item {
            padding: 10px 12px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .query-version-item:hover {
            background: #1a3a52;
        }

        .query-version-item.selected {
            background: #094771;
        }

        .query-version-item.tracked-base {
            border-left: 3px solid #cca700;
            padding-left: 9px;
            background: rgba(204, 167, 0, 0.08);
        }

        .query-version-item.tracked-base:hover {
            background: rgba(204, 167, 0, 0.15);
        }

        .query-version-item.selected.tracked-base {
            background: #094771;
            box-shadow: inset 0 0 0 2px #cca700;
        }

        .query-version-item.tracked-base .version-label::after {
            content: 'Base';
            margin-left: 6px;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.65rem;
            font-weight: 500;
            color: #cca700;
            background: rgba(204, 167, 0, 0.15);
            vertical-align: middle;
        }

        .query-version-item.draft {
            border-left: 3px solid #f48771;
            padding-left: 9px;
            background: rgba(244, 135, 113, 0.08);
        }

        .query-version-item.draft:hover {
            background: rgba(244, 135, 113, 0.15);
        }

        .query-version-item.selected.draft {
            background: #094771;
            box-shadow: inset 0 0 0 2px #f48771;
        }

        .query-version-item.draft .version-label::after {
            content: 'Draft';
            margin-left: 6px;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.65rem;
            font-weight: 500;
            color: #f48771;
            background: rgba(244, 135, 113, 0.15);
            vertical-align: middle;
        }

        .query-version-item .version-label {
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .query-version-item .version-meta {
            color: #888;
            font-size: 0.75rem;
        }

        #query-version-preview {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 100px;
        }

        #query-version-preview-toolbar {
            display: flex;
            gap: 4px;
            padding: 6px 8px;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        .preview-mode-btn {
            padding: 4px 10px;
            background: #2d2d2d;
            border: none;
            color: #8a8a8a;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .preview-mode-btn.active {
            background: #0e639c;
            color: #fff;
        }

        .preview-mode-btn:hover:not(.active) {
            background: #3d3d3d;
        }

        #query-version-preview-content {
            flex: 1;
            overflow: auto;
            background: #1e1e1e;
        }

        #query-version-preview pre {
            margin: 0;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #d4d4d4;
            background: #1e1e1e;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .diff-line {
            display: block;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .diff-added {
            background: rgba(40, 167, 69, 0.2);
            color: #7ec699;
        }

        .diff-removed {
            background: rgba(203, 36, 49, 0.2);
            color: #f48771;
        }

        .diff-same {
            color: #888;
        }

        #query-history-actions {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }

        #query-save-message {
            flex: 1;
            padding: 6px 8px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            color: #ccc;
            font-size: 0.85rem;
            min-width: 0;
        }

        .query-history-btn {
            padding: 6px 12px;
            background: #0e639c;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .query-history-btn:hover {
            background: #1177bb;
        }

        .query-history-btn.secondary {
            background: #3d3d3d;
        }

        .query-history-btn.secondary:hover {
            background: #4d4d4d;
        }

        .query-history-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 4px 12px;
            background: #007acc;
            color: #ffffff;
            font-size: 0.8rem;
            flex-shrink: 0;
            min-height: 22px;
        }

        #status-bar .status-item {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #status-bar .status-item.dirty {
            color: #ffe082;
        }

        #status-bar .status-spacer {
            flex: 1;
        }

        .tab.dirty .tab-title::after {
            content: ' •';
            color: #ffa500;
        }

        #explorer-footer {
            padding: 10px 12px;
            font-size: 0.85rem;
            color: #8a8a8a;
            border-top: 1px solid #333;
        }

        .folder-root {
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: #9cdcfe;
        }

        details.folder {
            margin-bottom: 6px;
        }

        details.folder>summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            color: #9cdcfe;
            list-style: none;
            padding: 4px 0;
            user-select: none;
        }

        details.folder>summary::before {
            content: '▾';
            display: inline-block;
            margin-right: 8px;
            transform: translateY(-1px);
            transition: transform 0.15s ease;
        }

        details.folder:not([open])>summary::before {
            content: '▸';
        }

        .folder-contents {
            padding-left: 14px;
        }

        .explorer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            color: #d4d4d4;
            margin: 2px 0;
            font-size: 0.95rem;
        }

        .explorer-item.active,
        .explorer-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
        }

        .explorer-item .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .explorer-item .file-actions {
            display: inline-flex;
            gap: 4px;
            margin-left: 12px;
            opacity: 0;
        }

        .explorer-item:hover .file-actions,
        .explorer-item.active .file-actions {
            opacity: 1;
        }

        .explorer-item .file-action {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 0.7rem;
            line-height: 1;
            padding: 0 3px;
            border-radius: 2px;
        }

        .explorer-item .file-action:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #bbb;
        }

        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #tab-row {
            display: flex;
            align-items: stretch;
            background: #252526;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
            min-width: 0;
        }

        #tab-nav-actions {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            padding: 4px 8px 4px 4px;
            gap: 4px;
        }

        button.project-action,
        #new-file-btn {
            background: #353535;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 3px;
            margin-right: 8px;
            font-weight: bold;
            fill: rgb(210, 210, 210);
        }

        button.project-action:hover,
        #new-file-btn:hover {
            background: #0098ff;
        }

        #new-file-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #new-folder-btn {
            background: #353535;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 3px;
            margin-right: 8px;
            font-weight: bold;
            fill: rgb(210, 210, 210);
        }

        button.project-action:hover,
        #new-folder-btn:hover {
            background: #0098ff;
        }

        #new-folder-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #project-name {
            margin-left: 12px;
            color: #9cdcfe;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 320px;
        }

        #tab-bar {
            display: flex;
            gap: 2px;
            overflow-x: auto;
            flex: 1;
            min-width: 0;
        }

        .tab {
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 12px;
            background: #2d2d2d;
            cursor: pointer;
            border: none;
            color: #969696;
            min-width: 120px;
            text-align: left;
            border-right: 1px solid #1e1e1e;
            user-select: none;
            transition: opacity 0.1s;
        }

        .tab.active {
            background: #1e1e1e;
            color: white;
        }

        .tab.dragging {
            opacity: 0.5;
            background: #3d3d3d;
        }

        .tab.drag-over {
            border-left: 2px solid #0e639c;
        }

        .tab-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            color: inherit;
        }

        .tab-close {
            border: none;
            background: transparent;
            color: #9d9d9d;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0 4px;
            border-radius: 4px;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        #views-container {
            flex: 1;
            position: relative;
        }

        webview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
        }

        webview.active {
            opacity: 1;
            pointer-events: auto;
        }

        #quick-search-overlay {
            position: absolute;
            inset: 0;
            background: rgba(20, 20, 20, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }

        #quick-search-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #quick-search-modal {
            width: min(560px, calc(100% - 40px));
            border-radius: 10px;
            padding: 20px;
            background: #1d1f21;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        #quick-search-hint {
            margin-bottom: 12px;
            color: #9a9a9a;
            font-size: 0.95rem;
        }

        #quick-search-input {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 6px;
            background: #101214;
            color: #ffffff;
            font-size: 1rem;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            outline: none;
        }

        #quick-search-results {
            max-height: 250px;
            overflow: auto;
            margin-top: 10px;
            background: #161719;
            border: 1px solid #333;
            border-radius: 8px;
        }

        .quick-search-item {
            padding: 11px 14px;
            cursor: pointer;
            color: #d4d4d4;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .quick-search-snippet {
            margin-top: 6px;
            color: #8a8a8a;
            font-size: 0.95rem;
            line-height: 1.35;
            white-space: pre-wrap;
        }

        #new-file-modal {
            position: absolute;
            inset: 0;
            background: rgba(20, 20, 20, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }

        #new-file-modal.visible,
        #confirm-modal.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #confirm-modal {
            position: absolute;
            inset: 0;
            background: rgba(20, 20, 20, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 25;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }

        #confirm-modal-box {
            width: min(440px, calc(100% - 40px));
            background: #1f2124;
            border-radius: 12px;
            border: 1px solid #333;
            padding: 22px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }

        #confirm-modal-title {
            font-weight: 600;
            font-size: 1rem;
            color: #e0e0e0;
            margin-bottom: 10px;
        }

        #confirm-modal-body {
            color: #b0b0b0;
            font-size: 0.9rem;
            line-height: 1.45;
            margin-bottom: 18px;
            white-space: pre-wrap;
        }

        #new-file-modal-box {
            width: min(480px, calc(100% - 40px));
            background: #1f2124;
            border-radius: 12px;
            border: 1px solid #333;
            padding: 22px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }

        #new-file-modal-box label {
            display: block;
            margin-bottom: 10px;
            color: #c9d1d9;
            font-size: 0.95rem;
        }

        .modal-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        #new-file-modal-input,
        #new-file-folder-select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #101214;
            color: #ffffff;
            outline: none;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .folder-actions {
            display: inline-flex;
            gap: 6px;
        }

        .folder-actions button {
            background: transparent;
            border: none;
            color: #9d9d9d;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 6px;
            border-radius: 4px;
        }

        .folder-actions button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
        }

        .modal-button {
            padding: 9px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: #ffffff;
            background: #2d2d2d;
        }

        .modal-button.primary {
            background: #007acc;
        }

        .modal-button:hover {
            opacity: 0.95;
        }

        .modal-button.primary:hover {
            background: #0098ff;
        }

        .quick-search-item:last-child {
            border-bottom: none;
        }

        .quick-search-item.selected,
        .quick-search-item:hover {
            background: #094771;
            color: #ffffff;
        }

        #quick-search-empty {
            padding: 14px;
            color: #7a7a7a;
        }
    </style>
</head>

<body>
    <div id="app-shell">
        <button id="sidebar-reopen" type="button" title="Show searches">▶</button>
        <aside id="sidebar">
            <div id="sidebar-header">
                <span id="sidebar-header-title">Searches</span>
                <span id="sidebar-header-actions">
                    <button id="new-file-btn" type="button" disabled title="New Search">+</button>
                    <button id="sidebar-collapse-btn" type="button" title="Hide searches">‹</button>
                </span>
            </div>
            <div id="explorer"></div>
        </aside>

        <div id="main-area">
            <div id="header" hidden>
                <button id="new-project-btn" class="project-action" style="padding: 5px 15px">New Project</button>
                <button id="open-project-btn" class="project-action" style="padding: 5px 15px">Open Project</button>
                <div id="project-name">No project loaded</div>
            </div>
            <div id="tab-row">
                <div id="tab-bar"></div>
                <div id="tab-nav-actions">
                    <button id="prev-page-btn" class="project-action" style="font-size:larger; padding: 0 10px" title="Back">⬅</button>
                    <button id="next-page-btn" class="project-action" style="font-size:larger; padding: 0 10px" title="Forward">➡</button>
                    <button id="copy-url-btn" class="project-action" style="margin-right: 0; padding: 5px 10px" title="Copy URL of open file">Copy URL</button>
                </div>
            </div>

            <div id="views-container"></div>
        </div>

        <aside id="query-sidebar" class="collapsed">
            <div id="query-sidebar-resize" title="Drag to resize"></div>
            <div id="query-history-header">
                <span id="query-history-title">Query History</span>
                <span id="query-history-status"></span>
                <button id="query-history-close" type="button" title="Collapse timeline">×</button>
            </div>
            <div id="query-history-tabs">
                <button type="button" class="history-tab active" data-mode="history">History</button>
                <button type="button" class="history-tab" data-mode="tree">Tree</button>
                <button type="button" class="history-tab" data-mode="tags">Tags</button>
            </div>
            <div id="query-version-list"></div>
            <div id="query-version-preview">
                <div id="query-version-preview-toolbar">
                    <button type="button" class="preview-mode-btn active" data-mode="preview">Preview</button>
                    <button type="button" class="preview-mode-btn" data-mode="diff">Diff</button>
                </div>
                <div id="query-version-preview-content">
                    <pre id="query-version-preview-text">Select a version to preview SPL.</pre>
                </div>
            </div>
            <div id="query-history-actions">
                <input id="query-save-message" type="text" placeholder="Version note (optional)..." />
                <button id="query-save-btn" class="query-history-btn" type="button">Save Version</button>
                <button id="query-restore-btn" class="query-history-btn secondary" type="button" disabled>Restore</button>
            </div>
        </aside>
    </div>

    <div id="status-bar">
        <span id="status-file" class="status-item">No query open</span>
        <span id="status-save" class="status-item"></span>
        <span class="status-spacer"></span>
        <span id="status-versions" class="status-item"></span>
    </div>

    <div id="quick-search-overlay" class="">
        <div id="quick-search-modal">
            <div id="quick-search-hint">Type to search open files. Use arrow keys and Enter to open.</div>
            <input id="quick-search-input" type="text" placeholder="Search files..." autocomplete="off"
                spellcheck="false" />
            <div id="quick-search-results"></div>
        </div>
    </div>

    <div id="confirm-modal" class="">
        <div id="confirm-modal-box">
            <div id="confirm-modal-title"></div>
            <div id="confirm-modal-body"></div>
            <div class="modal-buttons">
                <button id="confirm-cancel" class="modal-button">Cancel</button>
                <button id="confirm-ok" class="modal-button primary">Confirm</button>
            </div>
        </div>
    </div>

    <div id="tag-popup">
        <input id="tag-popup-input" type="text" placeholder="Tag name..." autocomplete="off" spellcheck="false" />
        <div id="tag-popup-actions">
            <button id="tag-popup-cancel" type="button">Cancel</button>
            <button id="tag-popup-save" type="button">Tag</button>
        </div>
    </div>

    <div id="new-file-modal" class="">
        <div id="new-file-modal-box">
            <label id="new-file-modal-label" for="new-file-modal-input">New Search File Name</label>
            <input id="new-file-modal-input" type="text" placeholder="Enter file name or path" autocomplete="off"
                spellcheck="false"/> 
            <div id="new-file-folder-row" class="modal-row">
                <label for="new-file-folder-select">Folder</label>
                <select id="new-file-folder-select"></select>
            </div>
            <div class="modal-buttons">
                <button id="new-file-cancel" class="modal-button">Cancel</button>
                <button id="new-file-create" class="modal-button primary">Create</button>
            </div>
        </div>
    </div>

    <script src="./renderer.js"></script>
</body>

</html>
