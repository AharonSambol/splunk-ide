<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Splunk IDE</title>
    <style>
        /* Dark theme IDE styling */
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #cccccc;
        }

        #app-shell {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #sidebar {
            width: 260px;
            background: #252526;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        #sidebar-tabs {
            display: flex;
            border-bottom: 1px solid #333;
            background: #2d2d30;
        }

        .sidebar-tab {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: #8a8a8a;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.15s ease;
        }

        .sidebar-tab.active {
            color: #ffffff;
            border-bottom-color: #007acc;
        }

        .sidebar-tab:hover {
            color: #cccccc;
        }

        #sidebar-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: space-between;
            font-weight: bold;
            color: #f3f3f3;
            border-bottom: 1px solid #333;
        }

        #sidebar-header button {
            margin: 0;
        }

        #git-view {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        #git-view.active {
            display: flex;
        }

        #git-view-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: auto;
        }

        #git-status {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .git-file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            margin-bottom: 4px;
            background: #2d2d2d;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            user-select: none;
        }

        .git-file-item:hover {
            background: #3d3d3d;
        }

        .git-file-status {
            min-width: 20px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.75rem;
        }

        .git-file-status.modified {
            background: #ffa500;
            color: #000;
        }

        .git-file-status.added {
            background: #22863a;
            color: #fff;
        }

        .git-file-status.untracked {
            background: #6c757d;
            color: #fff;
        }

        .git-file-status.deleted {
            background: #cb2431;
            color: #fff;
        }

        .git-file-status.staged {
            background: #28a745;
            color: #fff;
        }

        .git-file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .git-actions {
            display: flex;
            gap: 4px;
        }

        .git-button-small {
            padding: 4px 8px;
            background: #0e639c;
            border: none;
            color: white;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .git-button-small:hover {
            background: #1177bb;
        }

        #git-controls {
            padding: 12px;
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #git-message {
            width: 100%;
            padding: 8px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            color: #cccccc;
            font-family: monospace;
            font-size: 0.85rem;
            resize: vertical;
            box-sizing: border-box;
            min-height: 80px;
        }

        #git-message::placeholder {
            color: #666;
        }

        #git-controls-buttons {
            display: flex;
            gap: 8px;
        }

        .git-button {
            flex: 1;
            padding: 10px;
            background: #0e639c;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .git-button:hover {
            background: #1177bb;
        }

        .git-button.secondary {
            background: #2d2d2d;
            color: #cccccc;
        }

        .git-button.secondary:hover {
            background: #3d3d3d;
        }

        .git-branch {
            padding: 8px 12px;
            background: #2d2d2d;
            border-radius: 4px;
            color: #cccccc;
            font-size: 0.85rem;
        }

        #git-tabs {
            display: flex;
            gap: 8px;
            padding: 12px;
            border-bottom: 1px solid #333;
        }

        .git-tab-btn {
            padding: 6px 12px;
            background: #2d2d2d;
            border: none;
            color: #8a8a8a;
            cursor: pointer;
            font-size: 0.85rem;
            border-radius: 3px;
            font-weight: 600;
        }

        .git-tab-btn.active {
            background: #0e639c;
            color: white;
        }

        .git-tab-btn:hover {
            background: #3d3d3d;
        }

        .git-tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .git-tab-content.active {
            display: flex;
        }

        #git-history {
            overflow-y: auto;
            flex: 1;
        }

        .git-commit-item {
            padding: 12px;
            border-bottom: 1px solid #333;
            background: #2d2d2d;
            margin: 8px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .git-commit-hash {
            font-family: monospace;
            color: #7ec699;
            font-size: 0.75rem;
        }

        .git-commit-message {
            color: #cccccc;
            margin: 4px 0;
            font-weight: 600;
        }

        .git-commit-meta {
            color: #888;
            font-size: 0.8rem;
            margin: 4px 0;
        }

        .git-commit-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .git-commit-btn {
            padding: 4px 10px;
            background: #0e639c;
            border: none;
            color: white;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .git-commit-btn:hover {
            background: #1177bb;
        }

        .git-commit-btn.danger {
            background: #cb2431;
        }

        .git-commit-btn.danger:hover {
            background: #d9393c;
        }

        #explorer {
            flex: 1;
            overflow: auto;
            padding: 10px 12px;
        }

        #explorer.hidden {
            display: none;
        }

        #explorer-footer {
            padding: 10px 12px;
            font-size: 0.85rem;
            color: #8a8a8a;
            border-top: 1px solid #333;
        }

        .folder-root {
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: #9cdcfe;
        }

        details.folder {
            margin-bottom: 6px;
        }

        details.folder>summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            color: #9cdcfe;
            list-style: none;
            padding: 4px 0;
            user-select: none;
        }

        details.folder>summary::before {
            content: '▾';
            display: inline-block;
            margin-right: 8px;
            transform: translateY(-1px);
            transition: transform 0.15s ease;
        }

        details.folder:not([open])>summary::before {
            content: '▸';
        }

        .folder-contents {
            padding-left: 14px;
        }

        .explorer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            color: #d4d4d4;
            margin: 2px 0;
            font-size: 0.95rem;
        }

        .explorer-item.active,
        .explorer-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
        }

        .explorer-item .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .explorer-item .file-actions {
            display: inline-flex;
            gap: 4px;
            margin-left: 12px;
        }

        .explorer-item .file-action {
            background: transparent;
            border: none;
            color: #9d9d9d;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 6px;
            border-radius: 4px;
        }

        .explorer-item .file-action:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header {
            display: flex;
            background: #252526;
            padding: 8px;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        button.project-action,
        #new-file-btn {
            background: #353535;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 3px;
            margin-right: 8px;
            font-weight: bold;
            fill: rgb(210, 210, 210);
        }

        button.project-action:hover,
        #new-file-btn:hover {
            background: #0098ff;
        }

        #new-file-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #new-folder-btn {
            background: #353535;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 3px;
            margin-right: 8px;
            font-weight: bold;
            fill: rgb(210, 210, 210);
        }

        button.project-action:hover,
        #new-folder-btn:hover {
            background: #0098ff;
        }

        #new-folder-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #project-name {
            margin-left: 12px;
            color: #9cdcfe;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 320px;
        }

        #tab-bar {
            display: flex;
            gap: 2px;
            overflow-x: auto;
            flex: 1;
        }

        .tab {
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 12px;
            background: #2d2d2d;
            cursor: pointer;
            border: none;
            color: #969696;
            min-width: 120px;
            text-align: left;
            border-right: 1px solid #1e1e1e;
            user-select: none;
            transition: opacity 0.1s;
        }

        .tab.active {
            background: #1e1e1e;
            color: white;
        }

        .tab.dragging {
            opacity: 0.5;
            background: #3d3d3d;
        }

        .tab.drag-over {
            border-left: 2px solid #0e639c;
        }

        .tab-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            color: inherit;
        }

        .tab-close {
            border: none;
            background: transparent;
            color: #9d9d9d;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0 4px;
            border-radius: 4px;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        #views-container {
            flex: 1;
            position: relative;
        }

        webview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
        }

        webview.active {
            opacity: 1;
            pointer-events: auto;
        }

        #quick-search-overlay {
            position: absolute;
            inset: 0;
            background: rgba(20, 20, 20, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }

        #quick-search-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #quick-search-modal {
            width: min(560px, calc(100% - 40px));
            border-radius: 10px;
            padding: 20px;
            background: #1d1f21;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        #quick-search-hint {
            margin-bottom: 12px;
            color: #9a9a9a;
            font-size: 0.95rem;
        }

        #quick-search-input {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 6px;
            background: #101214;
            color: #ffffff;
            font-size: 1rem;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            outline: none;
        }

        #quick-search-results {
            max-height: 250px;
            overflow: auto;
            margin-top: 10px;
            background: #161719;
            border: 1px solid #333;
            border-radius: 8px;
        }

        .quick-search-item {
            padding: 11px 14px;
            cursor: pointer;
            color: #d4d4d4;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        #new-file-modal {
            position: absolute;
            inset: 0;
            background: rgba(20, 20, 20, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }

        #new-file-modal.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #new-file-modal-box {
            width: min(480px, calc(100% - 40px));
            background: #1f2124;
            border-radius: 12px;
            border: 1px solid #333;
            padding: 22px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }

        #new-file-modal-box label {
            display: block;
            margin-bottom: 10px;
            color: #c9d1d9;
            font-size: 0.95rem;
        }

        .modal-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        #new-file-modal-input,
        #new-file-folder-select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #101214;
            color: #ffffff;
            outline: none;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .folder-actions {
            display: inline-flex;
            gap: 6px;
        }

        .folder-actions button {
            background: transparent;
            border: none;
            color: #9d9d9d;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 6px;
            border-radius: 4px;
        }

        .folder-actions button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
        }

        .modal-button {
            padding: 9px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: #ffffff;
            background: #2d2d2d;
        }

        .modal-button.primary {
            background: #007acc;
        }

        .modal-button:hover {
            opacity: 0.95;
        }

        .modal-button.primary:hover {
            background: #0098ff;
        }

        .quick-search-item:last-child {
            border-bottom: none;
        }

        .quick-search-item.selected,
        .quick-search-item:hover {
            background: #094771;
            color: #ffffff;
        }

        #quick-search-empty {
            padding: 14px;
            color: #7a7a7a;
        }
    </style>
</head>

<body>
    <div id="app-shell">
        <aside id="sidebar">
            <div id="sidebar-tabs">
                <button class="sidebar-tab active" data-view="explorer">Explorer</button>
                <button class="sidebar-tab" data-view="git">Source Control</button>
            </div>

            <!-- Explorer View -->
            <div id="sidebar-header">
                <span>File Explorer</span>
                <span>
                    <button id="new-folder-btn" disabled>
                        <svg viewBox="0 0 24 24" width="35" height="35">
                            <path
                                d="M20 6h-8l-2-2H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2m-1 8h-3v3h-2v-3h-3v-2h3V9h2v3h3z">
                            </path>
                        </svg>
                    </button>
                    <button id="new-file-btn" disabled>
                        <svg viewBox="0 0 24 24" width="35" height="35">
                            <path
                                d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8zm2 14h-3v3h-2v-3H8v-2h3v-3h2v3h3zm-3-7V3.5L18.5 9z">
                            </path>
                        </svg>
                    </button>
                </span>
            </div>
            <div id="explorer"></div>
            <div id="explorer-footer">Press Shift twice to search files.</div>

            <!-- Git View -->
            <div id="git-view">
                <div id="git-view-content">
                    <div id="git-branch" class="git-branch"></div>
                    <div id="git-tabs">
                        <button class="git-tab-btn active" data-tab="changes">Changes</button>
                        <button class="git-tab-btn" data-tab="history">History</button>
                    </div>
                    <div id="git-changes-tab" class="git-tab-content active">
                        <div id="git-status"></div>
                    </div>
                    <div id="git-history-tab" class="git-tab-content">
                        <div id="git-history"></div>
                    </div>
                </div>
                <div id="git-controls">
                    <textarea id="git-message" placeholder="Commit message..."></textarea>
                    <div id="git-controls-buttons">
                        <button id="git-commit" class="git-button">Commit</button>
                        <button id="git-push" class="git-button">Push</button>
                        <button id="git-pull" class="git-button secondary">Pull</button>
                    </div>
                </div>
            </div>
        </aside>

        <div id="main-area">
            <div id="header">
                <button id="new-project-btn" class="project-action">New Project</button>
                <button id="open-project-btn" class="project-action">Open Project</button>
                <div id="project-name">No project loaded</div>

            </div>
            <div>
                <div id="tab-bar"></div>
            </div>

            <div id="views-container">

            </div>
        </div>
    </div>

    <div id="quick-search-overlay" class="">
        <div id="quick-search-modal">
            <div id="quick-search-hint">Type to search open files. Use arrow keys and Enter to open.</div>
            <input id="quick-search-input" type="text" placeholder="Search files..." autocomplete="off"
                spellcheck="false" />
            <div id="quick-search-results"></div>
        </div>
    </div>

    <div id="new-file-modal" class="">
        <div id="new-file-modal-box">
            <label id="new-file-modal-label" for="new-file-modal-input">New Search File Name</label>
            <input id="new-file-modal-input" type="text" placeholder="Enter file name or path" autocomplete="off"
                spellcheck="false"/> 
            <div id="new-file-folder-row" class="modal-row">
                <label for="new-file-folder-select">Folder</label>
                <select id="new-file-folder-select"></select>
            </div>
            <div class="modal-buttons">
                <button id="new-file-cancel" class="modal-button">Cancel</button>
                <button id="new-file-create" class="modal-button primary">Create</button>
            </div>
        </div>
    </div>

    <script src="./renderer.js"></script>
</body>

</html>
