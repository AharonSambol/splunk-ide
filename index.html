<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Splunk IDE</title>
    <style>
        /* Dark theme IDE styling */
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #cccccc;
        }

        #app-shell {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #sidebar {
            width: 260px;
            background: #252526;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        #sidebar-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: space-between;
            font-weight: bold;
            color: #f3f3f3;
            border-bottom: 1px solid #333;
        }

        #sidebar-header button {
            margin: 0;
        }

        #explorer {
            flex: 1;
            overflow: auto;
            padding: 10px 12px;
        }

        #explorer.hidden {
            display: none;
        }

        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        #query-history-panel {
            display: flex;
            flex-direction: column;
            border-top: 1px solid #333;
            background: #252526;
            max-height: 40vh;
            min-height: 180px;
        }

        #query-history-panel.collapsed {
            display: none;
        }

        #query-history-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid #333;
            background: #2d2d30;
        }

        #query-history-title {
            font-weight: 600;
            font-size: 0.9rem;
            flex: 1;
        }

        #query-history-status {
            font-size: 0.8rem;
            color: #8a8a8a;
        }

        #query-history-status.dirty {
            color: #ffa500;
        }

        #query-history-close {
            background: transparent;
            border: none;
            color: #8a8a8a;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 2px 6px;
            border-radius: 3px;
        }

        #query-history-close:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        #query-history-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        #query-version-list {
            width: 280px;
            border-right: 1px solid #333;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .query-version-item {
            padding: 10px 12px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .query-version-item:hover,
        .query-version-item.selected {
            background: #094771;
        }

        .query-version-item .version-label {
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .query-version-item .version-meta {
            color: #888;
            font-size: 0.75rem;
        }

        #query-version-preview {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #query-version-preview pre {
            flex: 1;
            margin: 0;
            padding: 12px;
            overflow: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #d4d4d4;
            background: #1e1e1e;
            white-space: pre-wrap;
            word-break: break-word;
        }

        #query-history-actions {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            border-top: 1px solid #333;
        }

        #query-save-message {
            flex: 1;
            padding: 6px 8px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            color: #ccc;
            font-size: 0.85rem;
        }

        .query-history-btn {
            padding: 6px 12px;
            background: #0e639c;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .query-history-btn:hover {
            background: #1177bb;
        }

        .query-history-btn.secondary {
            background: #3d3d3d;
        }

        .query-history-btn.secondary:hover {
            background: #4d4d4d;
        }

        .query-history-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .tab.dirty .tab-title::after {
            content: ' •';
            color: #ffa500;
        }

        #explorer-footer {
            padding: 10px 12px;
            font-size: 0.85rem;
            color: #8a8a8a;
            border-top: 1px solid #333;
        }

        .folder-root {
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: #9cdcfe;
        }

        details.folder {
            margin-bottom: 6px;
        }

        details.folder>summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            color: #9cdcfe;
            list-style: none;
            padding: 4px 0;
            user-select: none;
        }

        details.folder>summary::before {
            content: '▾';
            display: inline-block;
            margin-right: 8px;
            transform: translateY(-1px);
            transition: transform 0.15s ease;
        }

        details.folder:not([open])>summary::before {
            content: '▸';
        }

        .folder-contents {
            padding-left: 14px;
        }

        .explorer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            color: #d4d4d4;
            margin: 2px 0;
            font-size: 0.95rem;
        }

        .explorer-item.active,
        .explorer-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
        }

        .explorer-item .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .explorer-item .file-actions {
            display: inline-flex;
            gap: 4px;
            margin-left: 12px;
        }

        .explorer-item .file-action {
            background: transparent;
            border: none;
            color: #9d9d9d;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 6px;
            border-radius: 4px;
        }

        .explorer-item .file-action:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header {
            display: flex;
            background: #252526;
            padding: 8px;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        button.project-action,
        #new-file-btn {
            background: #353535;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 3px;
            margin-right: 8px;
            font-weight: bold;
            fill: rgb(210, 210, 210);
        }

        button.project-action:hover,
        #new-file-btn:hover {
            background: #0098ff;
        }

        #new-file-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #new-folder-btn {
            background: #353535;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 3px;
            margin-right: 8px;
            font-weight: bold;
            fill: rgb(210, 210, 210);
        }

        button.project-action:hover,
        #new-folder-btn:hover {
            background: #0098ff;
        }

        #new-folder-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #project-name {
            margin-left: 12px;
            color: #9cdcfe;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 320px;
        }

        #tab-bar {
            display: flex;
            gap: 2px;
            overflow-x: auto;
            flex: 1;
        }

        .tab {
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 12px;
            background: #2d2d2d;
            cursor: pointer;
            border: none;
            color: #969696;
            min-width: 120px;
            text-align: left;
            border-right: 1px solid #1e1e1e;
            user-select: none;
            transition: opacity 0.1s;
        }

        .tab.active {
            background: #1e1e1e;
            color: white;
        }

        .tab.dragging {
            opacity: 0.5;
            background: #3d3d3d;
        }

        .tab.drag-over {
            border-left: 2px solid #0e639c;
        }

        .tab-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            color: inherit;
        }

        .tab-close {
            border: none;
            background: transparent;
            color: #9d9d9d;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0 4px;
            border-radius: 4px;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        #views-container {
            flex: 1;
            position: relative;
        }

        webview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
        }

        webview.active {
            opacity: 1;
            pointer-events: auto;
        }

        #quick-search-overlay {
            position: absolute;
            inset: 0;
            background: rgba(20, 20, 20, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }

        #quick-search-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #quick-search-modal {
            width: min(560px, calc(100% - 40px));
            border-radius: 10px;
            padding: 20px;
            background: #1d1f21;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        #quick-search-hint {
            margin-bottom: 12px;
            color: #9a9a9a;
            font-size: 0.95rem;
        }

        #quick-search-input {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 6px;
            background: #101214;
            color: #ffffff;
            font-size: 1rem;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            outline: none;
        }

        #quick-search-results {
            max-height: 250px;
            overflow: auto;
            margin-top: 10px;
            background: #161719;
            border: 1px solid #333;
            border-radius: 8px;
        }

        .quick-search-item {
            padding: 11px 14px;
            cursor: pointer;
            color: #d4d4d4;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .quick-search-snippet {
            margin-top: 6px;
            color: #8a8a8a;
            font-size: 0.95rem;
            line-height: 1.35;
            white-space: pre-wrap;
        }

        #new-file-modal {
            position: absolute;
            inset: 0;
            background: rgba(20, 20, 20, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }

        #new-file-modal.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #new-file-modal-box {
            width: min(480px, calc(100% - 40px));
            background: #1f2124;
            border-radius: 12px;
            border: 1px solid #333;
            padding: 22px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }

        #new-file-modal-box label {
            display: block;
            margin-bottom: 10px;
            color: #c9d1d9;
            font-size: 0.95rem;
        }

        .modal-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        #new-file-modal-input,
        #new-file-folder-select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #101214;
            color: #ffffff;
            outline: none;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .folder-actions {
            display: inline-flex;
            gap: 6px;
        }

        .folder-actions button {
            background: transparent;
            border: none;
            color: #9d9d9d;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 6px;
            border-radius: 4px;
        }

        .folder-actions button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
        }

        .modal-button {
            padding: 9px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: #ffffff;
            background: #2d2d2d;
        }

        .modal-button.primary {
            background: #007acc;
        }

        .modal-button:hover {
            opacity: 0.95;
        }

        .modal-button.primary:hover {
            background: #0098ff;
        }

        .quick-search-item:last-child {
            border-bottom: none;
        }

        .quick-search-item.selected,
        .quick-search-item:hover {
            background: #094771;
            color: #ffffff;
        }

        #quick-search-empty {
            padding: 14px;
            color: #7a7a7a;
        }
    </style>
</head>

<body>
    <div id="app-shell">
        <aside id="sidebar">
            <div id="sidebar-header">
                <span>File Explorer</span>
                <span>
                    <button id="new-folder-btn" disabled>
                        <svg viewBox="0 0 24 24" width="35" height="35">
                            <path
                                d="M20 6h-8l-2-2H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2m-1 8h-3v3h-2v-3h-3v-2h3V9h2v3h3z">
                            </path>
                        </svg>
                    </button>
                    <button id="new-file-btn" disabled>
                        <svg viewBox="0 0 24 24" width="35" height="35">
                            <path
                                d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8zm2 14h-3v3h-2v-3H8v-2h3v-3h2v3h3zm-3-7V3.5L18.5 9z">
                            </path>
                        </svg>
                    </button>
                </span>
            </div>
            <div id="explorer"></div>
            <div id="explorer-footer">Press Shift twice to search files.</div>
        </aside>

        <div id="main-area">
            <div id="header">
                <button id="new-project-btn" class="project-action" style="padding: 5px 15px">New Project</button>
                <button id="open-project-btn" class="project-action" style="padding: 5px 15px">Open Project</button>
                <div id="project-name">No project loaded</div>
                <button id="prev-page-btn" class="project-action" style="margin-left: auto; font-size:larger; padding: 0 10px" title="Back">⬅</button>
                <button id="next-page-btn" class="project-action" style="font-size:larger; padding: 0 10px" title="Forward">➡</button>
                <button id="copy-url-btn" class="project-action" style="margin-right: 0; padding: 5px 10px" title="Copy URL of open file">Copy URL</button>
                <button id="query-history-btn" class="project-action" style="margin-right: 8px; padding: 5px 10px" title="Query version history">History</button>
            </div>
            <div>
                <div id="tab-bar"></div>
            </div>

            <div id="main-content">
                <div id="views-container"></div>
                <div id="query-history-panel" class="collapsed">
                    <div id="query-history-header">
                        <span id="query-history-title">Query History</span>
                        <span id="query-history-status"></span>
                        <button id="query-history-close" type="button" title="Close">×</button>
                    </div>
                    <div id="query-history-body">
                        <div id="query-version-list"></div>
                        <div id="query-version-preview">
                            <pre id="query-version-preview-text">Select a version to preview SPL.</pre>
                        </div>
                    </div>
                    <div id="query-history-actions">
                        <input id="query-save-message" type="text" placeholder="Version note (optional)..." />
                        <button id="query-save-btn" class="query-history-btn" type="button">Save Version</button>
                        <button id="query-restore-btn" class="query-history-btn secondary" type="button" disabled>Restore</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="quick-search-overlay" class="">
        <div id="quick-search-modal">
            <div id="quick-search-hint">Type to search open files. Use arrow keys and Enter to open.</div>
            <input id="quick-search-input" type="text" placeholder="Search files..." autocomplete="off"
                spellcheck="false" />
            <div id="quick-search-results"></div>
        </div>
    </div>

    <div id="new-file-modal" class="">
        <div id="new-file-modal-box">
            <label id="new-file-modal-label" for="new-file-modal-input">New Search File Name</label>
            <input id="new-file-modal-input" type="text" placeholder="Enter file name or path" autocomplete="off"
                spellcheck="false"/> 
            <div id="new-file-folder-row" class="modal-row">
                <label for="new-file-folder-select">Folder</label>
                <select id="new-file-folder-select"></select>
            </div>
            <div class="modal-buttons">
                <button id="new-file-cancel" class="modal-button">Cancel</button>
                <button id="new-file-create" class="modal-button primary">Create</button>
            </div>
        </div>
    </div>

    <script src="./renderer.js"></script>
</body>

</html>
